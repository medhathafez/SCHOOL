<!DOCTYPE html>
<html lang="ar" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>استخرج من النص - نشاط مزدوج</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Simplified Arabic', Tahoma, sans-serif; }
        
        body {
            background-color: #f3f4f6; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2vh 1vw; 
            overflow-y: auto; 
            overflow-x: hidden;
        }

        /* Tabs Styles */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
            max-width: 1400px;
            margin-bottom: 20px;
            direction: rtl;
        }

        .tab-btn {
            padding: 12px 35px;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid #3b82f6;
            border-radius: 8px;
            background: white;
            color: #3b82f6;
            transition: all 0.3s;
            min-width: 180px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .tab-btn:hover { background: #eff6ff; }
        .tab-btn.active { background: #3b82f6; color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }

        .tab-btn .ar-text { display: inline; }
        .tab-btn .en-text { display: none; font-family: Tahoma, sans-serif; font-size: 20px; }
        
        .tab-btn:hover .ar-text { display: none; }
        .tab-btn:hover .en-text { display: inline; }
        .tab-btn.active:hover .en-text { display: none; }
        .tab-btn.active:hover .ar-text { display: inline; }

        /* App Container Styles */
        .app-container {
            display: none; /* Hidden by default, toggled via JS */
            flex-direction: row;
            width: 100%;
            max-width: 1400px;
            background: white;
            border-radius: 12px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            min-height: 85vh;
            position: relative;
        }

        .app-container.active-quiz {
            display: flex;
        }

        .sidebar {
            width: 320px;
            background-color: #ffffff;
            padding: 10px 15px; 
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e5e7eb; 
            direction: ltr;
        }

        .score-stamp {
            display: none;
            color: #ef4444;
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            border: 4px dashed #ef4444;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 10px;
            transform: rotate(-5deg);
            background-color: #fef2f2;
            line-height: 1.3;
        }

        .title-container { text-align: right; margin-bottom: 5px; direction: rtl; }
        .title {
            color: #000000;
            font-size: 22px; 
            font-weight: bold;
            position: relative;
            display: inline-block;
            padding-bottom: 5px;
        }
        .title::after { content: ''; position: absolute; bottom: 0; right: 0; width: 100%; height: 3px; background-color: #eab308; }
        
        .instruction { 
            font-size: 13px; 
            color: #4b5563; 
            margin-bottom: 10px; 
            text-align: left; 
            direction: ltr; 
            line-height: 1.3;
        }
        
        .categories-list { display: flex; flex-direction: column; gap: 5px; direction: rtl; flex-grow: 1; overflow-y: auto;} 
        
        .category-btn {
            display: flex; align-items: center; justify-content: flex-start; 
            padding: 6px 10px; 
            background-color: #ffffff;
            border: 2px solid #f3f4f6;
            border-radius: 8px;
            cursor: pointer; transition: all 0.3s ease; position: relative;
        }
        .category-btn:hover { background-color: #f9fafb; }

        .category-btn.active {
            border-style: solid;
            box-shadow: inset 0 0 0 2px rgba(0,0,0,0.05);
        }

        .category-btn::after {
            content: attr(data-en);
            position: absolute;
            bottom: 100%; 
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 6px;
            background: #1f2937;
            color: #ffffff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 13px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 50;
            font-family: Tahoma, sans-serif;
        }
        .category-btn::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 0px;
            border-width: 6px;
            border-style: solid;
            border-color: #1f2937 transparent transparent transparent;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 50;
        }
        .category-btn:hover::after, .category-btn:hover::before { opacity: 1; }
        
        .dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; margin-left: 10px; flex-shrink: 0; }
        
        .cat-text-container { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: flex-start; 
            width: 100%; 
            overflow: hidden;
        }
        
        .cat-label-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cat-label { 
            font-size: 18px; 
            color: #000000;
            font-weight: bold; 
            white-space: nowrap; 
        } 
        
        .cat-status { 
            font-size: 14px; 
            font-weight: bold;
            display: none; 
            white-space: nowrap;
        }

        .submit-btn {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .submit-btn:hover { background-color: #2563eb; }

        .text-area {
            flex-grow: 1; 
            background-color: #fefce8; 
            padding: 20px 3vw; 
            direction: rtl;
        }

        .reading-text {
            font-size: 30px; 
            line-height: 2.2; 
            color: #000000;
            text-align: justify;
            font-weight: bold; 
        }

        .word {
            cursor: pointer; padding: 0px 4px; border-radius: 6px; transition: all 0.3s ease;
            border-bottom: 3px solid transparent; display: inline-block;
        }
        .word:hover { background-color: rgba(0,0,0,0.05); }

        @media (max-width: 900px) {
            .app-container { flex-direction: column-reverse; height: auto; }
            .sidebar { width: 100%; border-right: none; border-top: 1px solid #e5e7eb; }
        }
    </style>
</head>
<body>

    <div class="tabs-container">
        <button class="tab-btn active" id="tab-0" onclick="switchTab(0)">
            <span class="ar-text">الجزء الأول</span>
            <span class="en-text">Part 1</span>
        </button>
        <button class="tab-btn" id="tab-1" onclick="switchTab(1)">
            <span class="ar-text">الجزء الثاني</span>
            <span class="en-text">Part 2</span>
        </button>
    </div>

    <div id="quizzes-wrapper" style="width: 100%; display: flex; justify-content: center;"></div>

    <script>
        // تعريف بيانات كلا النشاطين
        const quizzesData = [
            {
                id: 0,
                text: `مَرْحَبًا، اسْمِي زَايِدٌ. أَوَدُّ أَنْ أُخْبِرَكُمْ أَنِّي أَدْرُسُ فِي مَدْرَسَةٍ اسْمُهَا كُلِّيَّةُ جُمِيرَا، وَهِيَ مَدْرَسَةٌ ثَانَوِيَّةٌ دَوْلِيَّةٌ مُخْتَلِطَةٌ فِيهَا عَدَدٌ كَبِيرٌ جِدًّا مِنَ الطُّلَّابِ مِنْ دُوَلٍ وَجِنْسِيَّاتٍ مُخْتَلِفَةٍ. فِي الحَقِيقَةِ اليَوْمُ الدِّرَاسِيُّ فِي كُلِّيَّةِ جُمِيرَا مُنَظَّمٌ لِلْغَايَةِ. حَيْثُ يُوجَدُ فِي مَدْرَسَتِي سِتَّةُ دُرُوسٍ فِي اليَوْمِ، دَرْسَانِ صَبَاحًا وَدَرْسَانِ بَعْدَ اسْتِرَاحَةِ الفُطُورِ وَدَرْسَانِ بَعْدَ اسْتِرَاحَةِ الغَدَاءِ.`,
                categories: [
                    { id: 'c1', label: 'فِعْلًا مُضَارِعًا', en: 'Present tense verb', color: '#3b82f6' },
                    { id: 'c2', label: 'صِفَاتٍ', en: 'Adjectives', color: '#22c55e' },
                    { id: 'c3', label: 'رَوَابِطَ', en: 'Connectors', color: '#f59e0b' },
                    { id: 'c4', label: 'ظَرْفَ زَمَانٍ', en: 'Adverb of time', color: '#8b5cf6' },
                    { id: 'c5', label: 'جَمْعَ مُؤَنَّثٍ', en: 'Feminine plural', color: '#06b6d4' },
                    { id: 'c6', label: 'جَمْعَ تَكْسِيرٍ', en: 'Broken plural', color: '#ef4444' }, 
                    { id: 'c7', label: 'ضِدَّ (مُتَشَابِهَة)', en: 'Antonym', color: '#ec4899' },
                    { id: 'c8', label: 'جَمْعَ (طَالِب)', en: 'Plural', color: '#14b8a6' },
                    { id: 'c9', label: 'مُثَنَّى (دَرْس)', en: 'Dual', color: '#84cc16' },
                    { id: 'c10', label: 'جَمْعَ (جِنْسِيَّة)', en: 'Plural', color: '#9333ea' }
                ],
                rawAnswers: {
                    'c1': ['أَوَدُّ', 'أُخْبِرَكُمْ', 'أَدْرُسُ', 'يُوجَدُ'],
                    'c2': ['ثَانَوِيَّةٌ', 'دَوْلِيَّةٌ', 'مُخْتَلِطَةٌ', 'كَبِيرٌ', 'مُخْتَلِفَةٍ', 'الدِّرَاسِيُّ', 'مُنَظَّمٌ'],
                    'c3': ['حَيْثُ', 'وَهِيَ', 'وَجِنْسِيَّاتٍ', 'وَدَرْسَانِ'], 
                    'c4': ['صَبَاحًا', 'بَعْدَ'],
                    'c5': ['جِنْسِيَّاتٍ', 'وَجِنْسِيَّاتٍ'],
                    'c6': ['الطُّلَّابِ', 'دُوَلٍ', 'دُرُوسٍ'],
                    'c7': ['مُخْتَلِفَةٍ'],
                    'c8': ['الطُّلَّابِ'],
                    'c9': ['دَرْسَانِ', 'وَدَرْسَانِ'],
                    'c10': ['جِنْسِيَّاتٍ', 'وَجِنْسِيَّاتٍ']
                }
            },
            {
                id: 1,
                text: `فِي الواقِعِ اليَوْمَ الدِّراسيِّ طَويلٌ لَكِنَّهُ مُمْتِعٌ . الدُّروسُ تَبْدَأُ فِي السّاعَةِ الثّامِنَةِ إِلَّا رُبْعَ وتَنْتَهي فِي السّاعَةِ الثّالِثَةِ مَاعَدَا يَوْم الجُمْعَةِ ، تَنْتَهي الدُّروسُ فِي السّاعَةِ الحادية عَشْرَةَ ونصف ظُهْرًا . وَكُلُّ دَرْسٍ مُدَّتُهُ خمسٌ وخمسون (55) دَقيقَةٍ مَا عَدَا يَوْمُ الجُمُعَةِ مُدَّةَ الدَّرْسِ أربعون (40) دَقيقَةٍ . فِي المَدْرَسَةِ يوجَدُ مَرافِقُ رياضيَّةٌ مِثْلُ المَسْبَحِ وَأَيْضًا مَلْعَبٌ رياضيٌّ كَبيرٌ والذَّى نُمارِسُ فِيه رِيَاضَاتٍ مُخْتَلِفَةً . هُنَاكَ أَيْضًا مَعامِلُ وَقاعاتٌ إِعْلاميَّةٌ ومُقَصَفٌ كِبِيرٌ نَتناوَلُ فِيه غَدائَنا.`,
                categories: [
                    { id: 'p2c1', label: 'فِعْل مُضَارِع', en: 'Present verb', color: '#3b82f6' },
                    { id: 'p2c2', label: 'صِفَات', en: 'Adjectives', color: '#22c55e' },
                    { id: 'p2c3', label: 'رَوَابِط', en: 'Connectors', color: '#f59e0b' },
                    { id: 'p2c4', label: 'جَمْع مُؤَنَّث', en: 'Feminine plural', color: '#06b6d4' },
                    { id: 'p2c5', label: 'جَمْع تَكْسِير', en: 'Broken plural', color: '#ef4444' },
                    { id: 'p2c6', label: 'ضِدّ (صَغِير)', en: 'Antonym', color: '#ec4899' },
                    { id: 'p2c7', label: 'جَمْع (قَاعَة)', en: 'Plural', color: '#14b8a6' },
                    { id: 'p2c8', label: 'جَمْع (رِيَاضَة)', en: 'Plural', color: '#9333ea' }
                ],
                rawAnswers: {
                    'p2c1': ['تَبْدَأُ', 'تَنْتَهي', 'وتَنْتَهي', 'يوجَدُ', 'نُمارِسُ', 'نَتناوَلُ'],
                    'p2c2': ['طَويلٌ', 'مُمْتِعٌ', 'رياضيَّةٌ', 'رياضيٌّ', 'كَبيرٌ', 'مُخْتَلِفَةً', 'إِعْلاميَّةٌ', 'كِبِيرٌ'],
                    'p2c3': ['لَكِنَّهُ', 'إِلَّا', 'مَاعَدَا', 'مَا', 'وَأَيْضًا', 'أَيْضًا', 'والذَّى', 'مِثْلُ'], 
                    'p2c4': ['رِيَاضَاتٍ', 'قاعاتٌ', 'وَقاعاتٌ'],
                    'p2c5': ['الدُّروسُ', 'مَرافِقُ', 'مَعامِلُ'],
                    'p2c6': ['كَبيرٌ', 'كِبِيرٌ'],
                    'p2c7': ['قاعاتٌ', 'وَقاعاتٌ'],
                    'p2c8': ['رِيَاضَاتٍ']
                }
            }
        ];

        // مصفوفات لحفظ حالة كل نشاط بشكل مستقل
        let activeCategoryIds = [null, null];
        let userSelectionsMulti = [{}, {}]; 
        let phraseSpanGroupsMulti = [[], []];

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                let temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
        }

        function normalizeArabic(text) {
            return text.split(/\s+/).map(word => {
                let w = word.replace(/[\u064B-\u065F\u0640]/g, "") 
                            .replace(/[أإآٱ]/g, "ا") 
                            .replace(/ة/g, "ه") 
                            .replace(/[يى]/g, "ي") 
                            .replace(/[،.؛؟!"'()-]/g, "");
                
                if (w.length > 3 && w.startsWith("ال")) w = w.substring(2);
                else if (w.length > 4 && (w.startsWith("وال") || w.startsWith("فال") || w.startsWith("كال") || w.startsWith("بال"))) w = w.charAt(0) + w.substring(3);
                else if (w.length > 3 && w.startsWith("لل")) w = "ل" + w.substring(2);
                return w;
            }).join(" ").trim();
        }

        function hexToRgba(hex, alpha) {
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function playCategoryAudio(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let cleanText = text.replace(/\(.*?\)/g, '').trim(); 
                let msg = new SpeechSynthesisUtterance(cleanText);
                msg.lang = 'ar-SA';
                window.speechSynthesis.speak(msg);
            }
        }

        function switchTab(index) {
            document.getElementById('quiz-0').classList.remove('active-quiz');
            document.getElementById('quiz-1').classList.remove('active-quiz');
            
            document.getElementById(`quiz-${index}`).classList.add('active-quiz');
            
            document.getElementById('tab-0').classList.toggle('active', index === 0);
            document.getElementById('tab-1').classList.toggle('active', index === 1);
        }

        // بناء الواجهة والأنشطة
        function initQuizzes() {
            const wrapper = document.getElementById('quizzes-wrapper');

            quizzesData.forEach((q, index) => {
                shuffleArray(q.categories);

                q.correctAnswers = {};
                for (let catId in q.rawAnswers) {
                    q.correctAnswers[catId] = q.rawAnswers[catId].map(normalizeArabic);
                }

                let processedHTML = q.text.replace(/([\u0600-\u06FF0-9]+)/g, '<span class="word">$1</span>');

                let container = document.createElement('div');
                container.className = `app-container ${index === 0 ? 'active-quiz' : ''}`;
                container.id = `quiz-${index}`;
                
                container.innerHTML = `
                    <aside class="sidebar">
                        <div class="score-stamp" id="score-stamp-${index}">
                            <div id="stamp-score-${index}"></div>
                        </div>
                        <div class="title-container">
                            <h2 class="title">
                                اسْتَخْرِج مِن النَّصِّ
                                <span style="display: block; font-size: 14px; font-weight: normal; color: #6b7280; font-family: Tahoma, sans-serif; margin-top: 4px; line-height: 1;">Extract from the text</span>
                            </h2>
                        </div>
                        <p class="instruction">Click an item & select all matching words. Click Submit when done.</p>
                        
                        <div class="categories-list" id="categories-container-${index}"></div>
                        
                        <button class="submit-btn" id="submit-btn-${index}" onclick="submitQuiz(${index})">Submit</button>
                    </aside>
                    <main class="text-area">
                        <div id="text-container-${index}" class="reading-text">${processedHTML}</div>
                    </main>
                `;
                
                wrapper.appendChild(container);

                const categoriesContainer = document.getElementById(`categories-container-${index}`);
                
                q.categories.forEach(cat => {
                    const btn = document.createElement('div');
                    btn.className = `category-btn cat-btn-${index}`;
                    btn.id = `btn-${index}-${cat.id}`;
                    btn.dataset.en = cat.en; 
                    
                    btn.onclick = () => {
                        playCategoryAudio(cat.label);
                        selectCategory(index, cat.id, cat.color, btn);
                    };

                    btn.innerHTML = `
                        <span class="dot" style="background-color: ${cat.color};"></span>
                        <div class="cat-text-container">
                            <div class="cat-label-container">
                                <span class="cat-label">${cat.label}</span>
                                <span class="cat-status" id="status-${index}-${cat.id}"></span>
                            </div>
                        </div>
                    `;
                    categoriesContainer.appendChild(btn);
                });

                bindWords(index, q);
            });
        }

        function selectCategory(index, id, color, btnElement) {
            Array.from(document.querySelectorAll(`.cat-btn-${index}`)).forEach(b => {
                b.classList.remove('active');
                b.style.backgroundColor = "#ffffff";
                b.style.borderColor = "#f3f4f6";
            });

            btnElement.classList.add('active');
            btnElement.style.backgroundColor = hexToRgba(color, 0.3);
            btnElement.style.borderColor = color;

            activeCategoryIds[index] = id;
        }

        function updateSpanColors(index) {
            let q = quizzesData[index];
            let allWordSpans = Array.from(document.querySelectorAll(`#quiz-${index} .word`));
            
            allWordSpans.forEach(s => {
                s.style.backgroundColor = "";
                s.style.borderBottomColor = "transparent";
            });

            let activeCats = q.categories.filter(cat => userSelectionsMulti[index][cat.id] && userSelectionsMulti[index][cat.id].length > 0);

            activeCats.forEach(cat => {
                userSelectionsMulti[index][cat.id].forEach(span => {
                    span.style.backgroundColor = hexToRgba(cat.color, 0.3);
                    span.style.borderBottomColor = cat.color;
                });
            });
        }

        function bindWords(index, q) {
            let allWordSpans = Array.from(document.querySelectorAll(`#quiz-${index} .word`));
            let spanWords = allWordSpans.map(s => normalizeArabic(s.textContent));

            // إنشاء مجموعات الجمل إن وجدت
            Object.keys(q.correctAnswers).forEach(catId => {
                q.correctAnswers[catId].forEach(ans => {
                    let normAnsWords = ans.split(' ');
                    if (normAnsWords.length > 1) { 
                        let len = normAnsWords.length;
                        for (let i = 0; i <= spanWords.length - len; i++) {
                            let match = true;
                            for (let j = 0; j < len; j++) {
                                if (spanWords[i+j] !== normAnsWords[j]) { match = false; break; }
                            }
                            if (match) {
                                let group = [];
                                for(let j = 0; j < len; j++) group.push(allWordSpans[i+j]);
                                phraseSpanGroupsMulti[index].push({ catId: catId, spans: group });
                            }
                        }
                    }
                });
            });

            allWordSpans.forEach(span => {
                span.onclick = function() {
                    let activeCatId = activeCategoryIds[index];
                    if (!activeCatId) {
                        alert("الرجاء الضغط على المطلوب من القائمة الجانبية أولاً.");
                        return;
                    }
                    
                    let isPhraseCategory = q.correctAnswers[activeCatId].some(ans => ans.includes(' '));
                    let selectedSpans = [this]; 

                    if (isPhraseCategory) {
                        let possibleGroups = phraseSpanGroupsMulti[index].filter(g => g.catId === activeCatId && g.spans.includes(this));
                        if (possibleGroups.length > 0) {
                            possibleGroups.sort((a,b) => b.spans.length - a.spans.length); 
                            selectedSpans = possibleGroups[0].spans;
                        }
                    }

                    if (!userSelectionsMulti[index][activeCatId]) {
                        userSelectionsMulti[index][activeCatId] = [];
                    }

                    let catSelections = userSelectionsMulti[index][activeCatId];
                    let alreadySelected = selectedSpans.every(s => catSelections.includes(s));

                    if (alreadySelected) {
                        // إزالة التحديد إذا تم النقر عليه مرة أخرى
                        selectedSpans.forEach(s => {
                            let sIdx = catSelections.indexOf(s);
                            if (sIdx > -1) catSelections.splice(sIdx, 1);
                        });
                    } else {
                        // إضافة التحديد (متعدد)
                        selectedSpans.forEach(s => {
                            if (!catSelections.includes(s)) {
                                catSelections.push(s);
                            }
                        });
                    }
                    
                    let statusEl = document.getElementById(`status-${index}-${activeCatId}`);
                    if (catSelections.length > 0) {
                        statusEl.innerText = ` (${catSelections.length} مُحدد)`;
                        statusEl.style.color = "#3b82f6";
                        statusEl.style.display = 'inline-block';
                    } else {
                        statusEl.style.display = 'none';
                    }

                    updateSpanColors(index);
                };
            });
        }

        function revealAllAnswers(index) {
            let q = quizzesData[index];
            let allWordSpans = Array.from(document.querySelectorAll(`#quiz-${index} .word`));
            
            allWordSpans.forEach(s => {
                s.style.backgroundColor = "";
                s.style.borderBottom = "3px solid transparent";
            });

            q.categories.forEach(cat => {
                let isPhrase = q.correctAnswers[cat.id].some(ans => ans.includes(' '));
                if (isPhrase) {
                    let group = phraseSpanGroupsMulti[index].find(g => g.catId === cat.id);
                    if (group) {
                        group.spans.forEach(span => {
                            span.style.borderBottom = `3px dashed ${cat.color}`;
                            span.style.backgroundColor = hexToRgba(cat.color, 0.15);
                        });
                    }
                } else {
                    allWordSpans.forEach(span => {
                        let cleanWord = normalizeArabic(span.textContent);
                        if (q.correctAnswers[cat.id].includes(cleanWord)) {
                            span.style.borderBottom = `3px dashed ${cat.color}`;
                            span.style.backgroundColor = hexToRgba(cat.color, 0.15);
                        }
                    });
                }
            });
        }

        // --- التعديل هنا في دالة الحفظ وحساب الدرجات ---
        function submitQuiz(index) {
            let q = quizzesData[index];
            let score = 0;
            let total = q.categories.length;
            
            q.categories.forEach(cat => {
                let statusEl = document.getElementById(`status-${index}-${cat.id}`);
                let catSelections = userSelectionsMulti[index][cat.id] || [];
                
                if (catSelections.length > 0) {
                    let isCorrect = true; // نفترض أن الإجابة صحيحة مبدئياً

                    // التحقق: هل يوجد أي اختيار خاطئ ضمن ما حدده الطالب؟
                    for (let i = 0; i < catSelections.length; i++) {
                        let text = normalizeArabic(catSelections[i].textContent);
                        // إذا كانت الكلمة المحددة غير موجودة في الإجابات الصحيحة
                        if (!q.correctAnswers[cat.id].includes(text)) {
                            isCorrect = false; // إذاً الإجابة خاطئة
                            break; // نوقف البحث بمجرد العثور على خطأ واحد
                        }
                    }
                    
                    if (isCorrect) {
                        score++;
                        statusEl.innerText = ' ✔ صحيح';
                        statusEl.style.color = '#10b981';
                    } else {
                        statusEl.innerText = ' ✘ خطأ';
                        statusEl.style.color = '#ef4444';
                    }
                } else {
                    statusEl.innerText = ' ✘ لم يُجب';
                    statusEl.style.color = '#ef4444';
                }
                statusEl.style.display = 'inline-block';
            });

            let stamp = document.getElementById(`score-stamp-${index}`);
            document.getElementById(`stamp-score-${index}`).innerText = `You got ${score}/${total}!`;
            stamp.style.display = 'block';

            document.getElementById(`submit-btn-${index}`).style.display = 'none';

            // تأخير بسيط لالتقاط الصورة
            setTimeout(() => {
                let captureTarget = document.getElementById(`quiz-${index}`);
                if (typeof html2canvas !== 'undefined') {
                    html2canvas(captureTarget, { scale: 2 }).then(canvas => {
                        let link = document.createElement('a');
                        link.download = `Result_Part_${index + 1}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        revealAllAnswers(index);
                    }).catch(err => {
                        console.error("Error generating image:", err);
                        revealAllAnswers(index);
                    });
                } else {
                    revealAllAnswers(index);
                }
            }, 600);
        }

        window.onload = initQuizzes;
    </script>
</body>
